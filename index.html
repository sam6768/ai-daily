<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>三木AI 每日一刻钟</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f7fa;
      --card-bg: #ffffff;
      --text-primary: #1a1a2e;
      --text-secondary: #5a5a7a;
      --text-muted: #8a8aa0;
      --accent-blue: #2563eb;
      --accent-blue-light: #dbeafe;
      --accent-purple: #7c3aed;
      --accent-purple-light: #ede9fe;
      --accent-teal: #0d9488;
      --accent-teal-light: #ccfbf1;
      --accent-orange: #ea580c;
      --accent-orange-light: #ffedd5;
      --accent-green: #16a34a;
      --accent-green-light: #dcfce7;
      --border: #e2e8f0;
      --border-light: #f1f5f9;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 4px 12px rgba(0,0,0,0.03);
      --shadow-hover: 0 4px 12px rgba(0,0,0,0.06), 0 8px 24px rgba(0,0,0,0.04);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }
    .app { max-width: 800px; margin: 0 auto; padding: 24px 16px 48px; }

    /* ===== Top Nav Bar ===== */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 20px;
      padding: 0 4px;
    }
    .topbar-brand {
      display: flex;
      flex-direction: column;
    }
    .topbar-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: 0.5px;
    }
    .topbar-sub {
      font-size: 12px;
      color: var(--text-muted);
    }
    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: var(--radius-sm);
      border: 0.5px solid var(--border);
      background: var(--card-bg);
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
      text-decoration: none;
    }
    .btn:hover {
      border-color: var(--accent-blue);
      color: var(--accent-blue);
      background: var(--accent-blue-light);
    }
    .btn-primary {
      background: var(--accent-blue);
      color: white;
      border-color: var(--accent-blue);
    }
    .btn-primary:hover {
      background: #1d4ed8;
      color: white;
    }
    .btn svg { width: 16px; height: 16px; }

    /* ===== Date Picker Strip ===== */
    .date-strip {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
      padding: 12px 16px;
      background: var(--card-bg);
      border-radius: var(--radius);
      border: 0.5px solid var(--border);
      box-shadow: var(--shadow);
    }
    .date-strip .nav-btn {
      width: 32px; height: 32px;
      border-radius: var(--radius-sm);
      border: 0.5px solid var(--border);
      background: var(--bg);
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      transition: all 0.15s ease;
      flex-shrink: 0;
    }
    .date-strip .nav-btn:hover {
      background: var(--accent-blue-light);
      color: var(--accent-blue);
      border-color: var(--accent-blue);
    }
    .date-strip .current-date {
      flex: 1;
      text-align: center;
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
    }
    .date-strip .calendar-toggle {
      font-size: 12px;
      color: var(--accent-blue);
      cursor: pointer;
      padding: 4px 10px;
      border-radius: var(--radius-sm);
      transition: background 0.15s;
    }
    .date-strip .calendar-toggle:hover {
      background: var(--accent-blue-light);
    }

    /* ===== Calendar Panel ===== */
    .calendar-panel {
      display: none;
      background: var(--card-bg);
      border-radius: var(--radius);
      border: 0.5px solid var(--border);
      box-shadow: var(--shadow);
      margin-bottom: 20px;
      overflow: hidden;
    }
    .calendar-panel.open { display: block; }
    .calendar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 0.5px solid var(--border);
    }
    .calendar-header .month-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
    }
    .calendar-header .month-nav {
      display: flex;
      gap: 4px;
    }
    .calendar-header .month-nav button {
      width: 28px; height: 28px;
      border-radius: var(--radius-sm);
      border: 0.5px solid var(--border);
      background: var(--bg);
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 14px;
      transition: all 0.15s ease;
    }
    .calendar-header .month-nav button:hover {
      background: var(--accent-blue-light);
      color: var(--accent-blue);
    }
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 1px;
      padding: 8px;
    }
    .calendar-grid .weekday {
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      padding: 6px 0;
      font-weight: 500;
    }
    .calendar-grid .day {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.15s ease;
      color: var(--text-secondary);
      position: relative;
    }
    .calendar-grid .day:hover {
      background: var(--accent-blue-light);
      color: var(--accent-blue);
    }
    .calendar-grid .day.empty {
      cursor: default;
      pointer-events: none;
    }
    .calendar-grid .day.today {
      color: var(--accent-blue);
      font-weight: 600;
      border: 1.5px solid var(--accent-blue);
    }
    .calendar-grid .day.has-data {
      background: var(--accent-blue);
      color: white;
      font-weight: 500;
    }
    .calendar-grid .day.has-data:hover {
      background: #1d4ed8;
    }
    .calendar-grid .day.has-data.active {
      box-shadow: 0 0 0 2px var(--accent-blue-light);
    }

    /* ===== Content Area ===== */
    #content-area {
      min-height: 200px;
    }
    #content-area .loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    #content-area .loading svg {
      width: 40px; height: 40px;
      margin-bottom: 12px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    #content-area .error {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    /* ===== Footer ===== */
    .app-footer {
      text-align: center;
      margin-top: 32px;
      padding-top: 24px;
      border-top: 0.5px solid var(--border);
    }
    .app-footer p {
      font-size: 12px;
      color: var(--text-muted);
    }
    .app-footer .brand {
      font-weight: 600;
      color: var(--text-secondary);
    }

    /* Responsive */
    @media (max-width: 480px) {
      .app { padding: 16px 12px 32px; }
      .topbar { flex-wrap: wrap; }
      .topbar-title { font-size: 16px; }
      .date-strip { padding: 10px 12px; }
      .date-strip .current-date { font-size: 13px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Top Bar -->
    <div class="topbar">
      <div class="topbar-brand">
        <span class="topbar-title">三木AI 每日一刻钟</span>
        <span class="topbar-sub">每天15分钟，读懂AI世界</span>
      </div>
      <div class="topbar-actions">
        <button class="btn" id="btn-today" title="回到今天">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          今天
        </button>
      </div>
    </div>

    <!-- Date Navigation Strip -->
    <div class="date-strip">
      <button class="nav-btn" id="prev-day" title="前一天">&#8249;</button>
      <div class="current-date" id="current-date-display">2026年6月14日 星期日</div>
      <button class="nav-btn" id="next-day" title="后一天">&#8250;</button>
      <span class="calendar-toggle" id="toggle-calendar">&#128197; 日历</span>
    </div>

    <!-- Calendar Panel -->
    <div class="calendar-panel" id="calendar-panel">
      <div class="calendar-header">
        <span class="month-title" id="calendar-month">2026年6月</span>
        <div class="month-nav">
          <button id="prev-month">&#8249;</button>
          <button id="next-month">&#8250;</button>
        </div>
      </div>
      <div class="calendar-grid" id="calendar-grid">
        <!-- JS generates this -->
      </div>
    </div>

    <!-- Content Area -->
    <div id="content-area">
      <div class="loading">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
        <p>正在加载今日简报...</p>
      </div>
    </div>

    <!-- Footer -->
    <div class="app-footer">
      <p><span class="brand">三木AI 每日一刻钟</span> · 每天15分钟，读懂AI世界</p>
      <p id="footer-date" style="margin-top: 4px;">2026年6月14日 · 共收录资讯13条</p>
    </div>
  </div>

  <script>
    (function() {
      // ===== State =====
      let availableDates = [];
      let currentDate = new Date(2026, 5, 14); // June 14, 2026
      let calendarDate = new Date(2026, 5, 14);
      const today = new Date(2026, 5, 14);

      const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
      const monthNames = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

      // ===== DOM refs =====
      const contentArea = document.getElementById('content-area');
      const dateDisplay = document.getElementById('current-date-display');
      const calendarPanel = document.getElementById('calendar-panel');
      const calendarGrid = document.getElementById('calendar-grid');
      const calendarMonth = document.getElementById('calendar-month');
      const footerDate = document.getElementById('footer-date');

      // ===== Format helpers =====
      function fmtDate(d) {
        const y = d.getFullYear(), m = d.getMonth() + 1, day = d.getDate();
        return `${y}年${m}月${day}日 星期${weekdays[d.getDay()]}`;
      }
      function isoDate(d) {
        const y = d.getFullYear(), m = String(d.getMonth() + 1).padStart(2, '0'), day = String(d.getDate()).padStart(2, '0');
        return `${y}-${m}-${day}`;
      }
      function parseDate(s) {
        const [y, m, d] = s.split('-').map(Number);
        return new Date(y, m - 1, d);
      }
      function sameDay(a, b) {
        return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
      }

      // ===== Load manifest =====
      async function loadManifest() {
        try {
          const resp = await fetch('manifest.json?t=' + Date.now());
          const data = await resp.json();
          availableDates = data.dates || [];
        } catch (e) {
          console.warn('manifest load failed:', e);
          availableDates = ['2026-06-14'];
        }
      }

      // ===== Load daily content =====
      async function loadDay(date) {
        currentDate = new Date(date);
        dateDisplay.textContent = fmtDate(currentDate);
        const iso = isoDate(currentDate);
        footerDate.textContent = fmtDate(currentDate);

        contentArea.innerHTML = `
          <div class="loading">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
            <p>正在加载 ${iso} 的简报...</p>
          </div>
        `;

        try {
          const resp = await fetch(`ai-daily-${iso}.html?t=${Date.now()}`);
          if (!resp.ok) throw new Error('Not found');
          const html = await resp.text();
          // Extract body content
          const bodyMatch = html.match(/<body[^>]*>([\s\S]*)<\/body>/i);
          const bodyContent = bodyMatch ? bodyMatch[1] : html;
          // Remove scripts and wrap in a container
          const clean = bodyContent.replace(/<script[\s\S]*?<\/script>/gi, '');
          contentArea.innerHTML = `<div class="daily-content">${clean}</div>`;
          document.title = `三木AI 每日一刻钟 | ${iso}`;
        } catch (err) {
          contentArea.innerHTML = `
            <div class="error">
              <p style="font-size: 40px; margin-bottom: 12px;">&#128218;</p>
              <p style="font-size: 15px; font-weight: 600; color: var(--text-primary); margin-bottom: 8px;">${iso} 暂无简报</p>
              <p style="font-size: 13px;">该日期的简报尚未生成，请查看其他日期。</p>
            </div>
          `;
        }

        updateCalendar();
      }

      // ===== Calendar =====
      function updateCalendar() {
        const y = calendarDate.getFullYear();
        const m = calendarDate.getMonth();
        calendarMonth.textContent = `${y}年${m + 1}月`;

        const firstDay = new Date(y, m, 1);
        const lastDay = new Date(y, m + 1, 0);
        const startOffset = firstDay.getDay();
        const daysInMonth = lastDay.getDate();

        let html = weekdays.map(w => `<div class="weekday">${w}</div>`).join('');

        // Empty cells
        for (let i = 0; i < startOffset; i++) {
          html += '<div class="day empty"></div>';
        }

        // Days
        for (let d = 1; d <= daysInMonth; d++) {
          const thisDate = new Date(y, m, d);
          const iso = isoDate(thisDate);
          const isToday = sameDay(thisDate, today);
          const isActive = sameDay(thisDate, currentDate);
          const hasData = availableDates.includes(iso);

          let cls = 'day';
          if (isToday) cls += ' today';
          if (hasData) cls += ' has-data';
          if (isActive && hasData) cls += ' active';

          html += `<div class="${cls}" data-date="${iso}">${d}</div>`;
        }

        calendarGrid.innerHTML = html;

        // Bind clicks
        calendarGrid.querySelectorAll('.day[data-date]').forEach(el => {
          el.addEventListener('click', () => {
            const iso = el.dataset.date;
            loadDay(parseDate(iso));
            calendarPanel.classList.remove('open');
          });
        });
      }

      // ===== Event bindings =====
      document.getElementById('toggle-calendar').addEventListener('click', () => {
        calendarPanel.classList.toggle('open');
      });

      document.getElementById('prev-day').addEventListener('click', () => {
        const d = new Date(currentDate);
        d.setDate(d.getDate() - 1);
        loadDay(d);
      });

      document.getElementById('next-day').addEventListener('click', () => {
        const d = new Date(currentDate);
        d.setDate(d.getDate() + 1);
        loadDay(d);
      });

      document.getElementById('btn-today').addEventListener('click', () => {
        loadDay(today);
      });

      document.getElementById('prev-month').addEventListener('click', () => {
        calendarDate.setMonth(calendarDate.getMonth() - 1);
        updateCalendar();
      });

      document.getElementById('next-month').addEventListener('click', () => {
        calendarDate.setMonth(calendarDate.getMonth() + 1);
        updateCalendar();
      });

      // ===== Init =====
      loadManifest().then(() => loadDay(today));
    })();
  </script>
</body>
</html>
